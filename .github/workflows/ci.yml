# CI for lean_models. Mirrors tools/ci.sh (the local entry point — keep in sync).
# The SV differential harness runs against Xcelium (`xrun`) where it exists
# (self-hosted) and otherwise against Icarus Verilog (`iverilog`, installed
# below via apt); tools/ci.sh auto-skips it only when neither simulator is
# present, so this workflow is safe on stock GitHub runners.
name: ci
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (pinned toolchain comes from lean-toolchain)
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}
      - name: Notebook dependencies
        run: |
          python3 -m pip install --user nbformat nbclient jupyter-core ipykernel
          # SV extraction (notebook 03 + extractors/sv) runs under python3.12 + pyslang
          python3.12 -m pip install --user pyslang || python3 -m pip install --user pyslang
      - name: Circuit simulators (SV and SPICE differential harnesses)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends iverilog ngspice
      - name: Restore Mathlib build cache
        run: lake exe cache get
      - name: Full check
        run: bash tools/ci.sh
