name = "lean-models"
defaultTargets = ["LeanModels", "Examples", "leanmodels-run"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.33.0-rc1"

[[lean_lib]]
name = "LeanModels"

[[lean_lib]]
name = "Examples"
globs = ["Examples.+"]

[[lean_exe]]
name = "leanmodels-run"
root = "Main"
